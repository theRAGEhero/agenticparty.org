server {
    listen 80;
    listen [::]:80;
    server_name agenticparty.org www.agenticparty.org;

    root /var/www/agenticparty.org;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/agenticparty.org.access.log;
    error_log /var/log/nginx/agenticparty.org.error.log;
}
